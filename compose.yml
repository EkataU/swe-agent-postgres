services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: temptabqac
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: pgadmin4@pgadmin.org
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - ./servers.json:/pgadmin/servers.json

  agent:
    image: python:3.12
    container_name: agent
    tty: true
    stdin_open: true
    environment:
      PGHOST: host.docker.internal
      PGPORT: 5432
      PGUSER: postgres
      PGDATABASE: temptabqac
      PGPASSWORD: postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MSWEA_MODEL_NAME: ${MSWEA_MODEL_NAME:-openai/gpt-5-nano-2025-08-07}
    command: >
      sh -c "
        apt-get -qq update &&
        apt-get install -qq -y postgresql-client &&
        pip install --quiet --upgrade pip --root-user-action ignore &&
        pip install --quiet mini-swe-agent --root-user-action ignore &&
        pip install --quiet sqlfluff --root-user-action ignore &&
        if [ -z \"$$OPENAI_API_KEY\" ] && [ -z \"$$ANTHROPIC_API_KEY\" ]; then
          echo 'Set OPENAI_API_KEY or ANTHROPIC_API_KEY in .env' && exit 1;
        fi &&
        if [ -n \"$$OPENAI_API_KEY\" ]; then mini-extra config set OPENAI_API_KEY \"$$OPENAI_API_KEY\"; fi &&
        if [ -n \"$$ANTHROPIC_API_KEY\" ]; then mini-extra config set ANTHROPIC_API_KEY \"$$ANTHROPIC_API_KEY\"; fi &&
        mini-extra config set MSWEA_MODEL_NAME \"$$MSWEA_MODEL_NAME\" &&
        mini-extra config set MSWEA_CONFIGURED true && \
        mini --task /agent/TASK.md --cost-limit=2 --output /agent/trajectory.json --yolo --exit-immediately && \
        tail -f /dev/null
      "
    volumes:
      - ./agent:/agent

volumes:
  pgdata:
